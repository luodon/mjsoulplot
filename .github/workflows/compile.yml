name: Build Binary

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Cache PyInstaller
        uses: actions/cache@v4
        with:
          path: ~/.cache/pyinstaller
          key: pyinstaller-${{ hashFiles('requirements.txt') }}

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir \
            --add-data "templates:templates" \
            --add-data "NotoSansSC-Regular.otf:." \
            --add-data "1s.svg:." \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.middleware.debug \
            --hidden-import uvicorn.middleware.proxy_headers \
            --hidden-import jinja2 \
            --name main \
            main.py

      - name: Package binary
        run: |
          cd dist && tar czf ../binary.tar.gz * && cd ..

      - uses: ncipollo/release-action@v1
        with:
          tag: latest-build
          artifacts: binary.tar.gz
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          skipIfReleaseExists: false
          omitBody: true
